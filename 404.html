<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 – YTNavigator</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: #0f0f13; color: #e8e8f0; display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 2rem; }
    .container { max-width: 480px; }
    h1 { font-size: 6rem; font-weight: 900; background: linear-gradient(135deg, #ff0050, #ff4081); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    h2 { font-size: 1.5rem; font-weight: 700; margin: 1rem 0 0.5rem; }
    p { color: #9898a8; margin-bottom: 2rem; line-height: 1.6; }
    a { display: inline-block; background: linear-gradient(135deg, #ff0050, #ff4081); color: white; text-decoration: none; padding: 0.75rem 2rem; border-radius: 12px; font-weight: 600; transition: transform 0.2s, box-shadow 0.2s; }
    a:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(255, 0, 80, 0.3); }
  </style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <h2>Page Not Found</h2>
    <p>The page you're looking for doesn't exist or has been moved. Let's get you back to the dashboard.</p>
    <a href="index.html">← Back to YTNavigator</a>
  </div>
</body>
</html>
